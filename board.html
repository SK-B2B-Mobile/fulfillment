<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Fulfillment · 총량피킹 현황판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05070D; --surface:#0D1220; --surface2:#131B30;
  --border:#212B45;
  --text:#EDF1F9; --text-dim:#8A93AC;
  --amber:#F59E0B; --amber-bg:rgba(245,158,11,0.12);
  --green:#10D97E; --green-bg:rgba(16,217,126,0.12);
  --gray:#3A4560; --gray-bg:rgba(58,69,96,0.25);
  --sans:'Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100%; overflow:hidden;}

/* ═══════════════ 상단 헤더 ═══════════════ */
.topbar{display:flex; align-items:center; justify-content:space-between; padding:22px 40px; border-bottom:2px solid var(--border); background:var(--surface);}
.tb-left{display:flex; align-items:center; gap:20px;}
.tb-logo{width:52px; height:52px; border-radius:12px; background:linear-gradient(135deg,#8B5CF6,#3B82F6); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:22px;}
.tb-title{font-size:26px; font-weight:800; letter-spacing:-0.01em;}
.tb-sub{font-family:var(--mono); font-size:14px; color:var(--text-dim); margin-top:2px;}
.tb-right{display:flex; align-items:center; gap:36px;}
.tb-stat{text-align:right;}
.tb-stat-label{font-family:var(--mono); font-size:12px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase;}
.tb-stat-value{font-family:var(--mono); font-size:34px; font-weight:800; line-height:1.1;}
.tb-clock{font-family:var(--mono); font-size:30px; font-weight:700; color:var(--text-dim); min-width:200px; text-align:right;}
.tb-progress-outer{width:280px;}
.tb-progress-bar{height:10px; background:var(--surface2); border-radius:5px; overflow:hidden; margin-top:6px;}
.tb-progress-bar > div{height:100%; background:linear-gradient(90deg,var(--amber),var(--green)); transition:width 0.6s;}

.status-dot{width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:8px;}
.status-dot.live{background:var(--green); box-shadow:0 0 12px var(--green);}
.status-dot.off{background:var(--gray);}

/* ═══════════════ 슬롯 그리드 ═══════════════ */
.board{padding:26px 36px; height:calc(100vh - 108px); overflow-y:auto;}
.zone-label{font-family:var(--mono); font-size:15px; color:var(--text-dim); letter-spacing:0.1em; margin:18px 0 12px; text-transform:uppercase;}
.zone-label:first-child{margin-top:0;}
.grid{display:grid; grid-template-columns:repeat(5, 1fr); gap:16px;}
.grid.small{grid-template-columns:repeat(5, 1fr);}

.card{background:var(--surface); border:2px solid var(--border); border-radius:16px; padding:18px 20px; min-height:190px; display:flex; flex-direction:column; transition:all 0.4s;}
.card.waiting{opacity:0.55;}
.card.active{border-color:var(--amber); background:var(--amber-bg); animation:pulse 1.5s ease-in-out infinite;}
/* ★ 2026-07-13 변경: 완료 슬롯을 테두리만 초록으로 강조하던 것에서, 칸 전체를
   초록색으로 꽉 채우도록 변경 — 멀리서도(TV 화면 특성상) 한눈에 "다 됐다"가
   확 들어오도록. 텍스트는 초록 배경 위에서 잘 읽히는 진한 색으로 전부 맞춤. */
.card.done{border-color:var(--green); background:var(--green);}
.card.flash{animation:flashDone 1.8s ease-out 2;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.4);} 50%{box-shadow:0 0 0 10px rgba(245,158,11,0);}}
@keyframes flashDone{0%{box-shadow:0 0 40px var(--green);} 100%{box-shadow:0 0 0 rgba(16,217,126,0);}}

.card-top{display:flex; justify-content:space-between; align-items:flex-start;}
.card-slot{font-family:var(--mono); font-size:48px; font-weight:800; color:var(--text-dim);}
.card.active .card-slot{color:var(--amber);}
.card.done .card-slot{color:#04140D;}
.card-ship{font-family:var(--mono); font-size:19px; font-weight:800; padding:6px 12px; border-radius:6px; letter-spacing:0.04em;}
/* ★ 2026-07-13 신규: 배송타입(UPS/PU/TK)별 색상 구분 — batch.html과 동일한 배색 사용 */
.card-ship.ship-UPS{background:rgba(139,92,246,0.18); color:#B39CFF;}
.card-ship.ship-PU{background:rgba(34,211,238,0.18); color:#67E4F5;}
.card-ship.ship-TK{background:rgba(245,158,11,0.18); color:#FBBF4E;}
.card-ship.ship-other{background:rgba(58,69,96,0.35); color:var(--text-dim);}
.card.done .card-ship{background:rgba(4,20,13,0.18); color:#04140D;}
.card-cust{font-size:30px; font-weight:700; margin-top:10px; line-height:1.2; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
.card.done .card-cust{color:#04140D;}
.card-bottom{margin-top:12px;}
.card-qty{font-family:var(--mono); font-size:26px; font-weight:700; color:var(--text-dim); margin-bottom:8px;}
.card.active .card-qty, .card.done .card-qty{color:var(--text);}
.card.done .card-qty{color:#04140D;}
.card-metarow{display:flex; justify-content:space-between; font-family:var(--mono); font-size:24px; font-weight:700; color:var(--text-dim); margin-bottom:8px;}
.card.active .card-metarow, .card.done .card-metarow{color:var(--text);}
.card.done .card-metarow{color:#04140D;}
.card-sku{opacity:0.85;}
.card-bar{height:11px; background:rgba(255,255,255,0.08); border-radius:5px; overflow:hidden;}
.card-bar > div{height:100%; background:var(--amber); transition:width 0.5s;}
.card.done .card-bar{background:rgba(4,20,13,0.18);}
.card.done .card-bar > div{background:#04140D;}
.card-done-tag{font-family:var(--mono); font-size:22px; font-weight:800; color:var(--green); margin-top:10px; display:none; align-items:center; gap:6px;}
.card.done .card-done-tag{display:flex; color:#04140D;}
.card-empty{display:flex; align-items:center; justify-content:center; height:100%; font-family:var(--mono); font-size:20px; color:var(--text-dim); opacity:0.4;}

.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; height:70vh; gap:16px;}
.empty-state h2{font-size:28px; color:var(--text-dim);}
.empty-state p{font-family:var(--mono); font-size:16px; color:var(--text-dim); opacity:0.6;}

/* ★ 2026-07-16 신규 — 이슈(EXP/NF/Damaged/OOS) 뱃지 + 상세 모달 */
.card-top-right{display:flex; align-items:center; gap:8px;}
.card-issue-badge{font-family:var(--mono); font-size:16px; font-weight:800; color:#FF4D6D; background:rgba(255,77,109,0.15); border:1.5px solid rgba(255,77,109,0.5); border-radius:8px; padding:3px 9px; cursor:pointer;}
.card-issue-badge:hover{background:rgba(255,77,109,0.28);}
.card.done .card-issue-badge{color:#04140D; background:rgba(4,20,13,0.18); border-color:rgba(4,20,13,0.4);}

.issue-modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:100; align-items:center; justify-content:center;}
.issue-modal-overlay.open{display:flex;}
.issue-modal{background:var(--surface); border:2px solid var(--border); border-radius:18px; width:min(640px, 90vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;}
.issue-modal-head{display:flex; justify-content:space-between; align-items:center; padding:22px 26px; border-bottom:2px solid var(--border);}
.issue-modal-head h3{font-size:24px; font-weight:800;}
.issue-modal-close{background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); width:38px; height:38px; border-radius:10px; font-size:16px; cursor:pointer;}
.issue-modal-body{padding:18px 26px; overflow-y:auto; display:flex; flex-direction:column; gap:12px;}
.issue-modal-row{background:rgba(255,77,109,0.06); border:1px solid rgba(255,77,109,0.3); border-radius:12px; padding:14px 18px;}
.issue-modal-row-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.issue-modal-reason{font-family:var(--mono); font-size:15px; font-weight:800; color:#FF4D6D;}
.issue-modal-qty{font-family:var(--mono); font-size:20px; font-weight:800;}
.issue-modal-name{font-size:17px; font-weight:700; margin-bottom:4px;}
.issue-modal-meta{font-family:var(--mono); font-size:13px; color:var(--text-dim);}
.issue-modal-note{margin-top:6px; font-size:14px; color:var(--text-dim); font-style:italic;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-logo">SK</div>
    <div>
      <div class="tb-title">총량피킹 현황판</div>
      <div class="tb-sub" id="batchLabel"><span class="status-dot off" id="liveDot"></span>연결 대기중...</div>
    </div>
  </div>
  <div class="tb-right">
    <div class="tb-stat">
      <div class="tb-stat-label">완료 슬롯</div>
      <div class="tb-stat-value" id="doneCount">-- / --</div>
      <div class="tb-progress-outer"><div class="tb-progress-bar"><div id="doneBar" style="width:0%"></div></div></div>
    </div>
    <div class="tb-clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="board" id="board">
  <div class="empty-state">
    <h2>오늘의 배치를 기다리는 중...</h2>
    <p id="emptyMsg">CONFIG.GAS_URL 확인 중</p>
  </div>
</div>

<!-- ★ 2026-07-16 신규 — 이슈(⚠) 뱃지 클릭 시 상세 목록 모달 -->
<div class="issue-modal-overlay" id="issueModalOverlay">
  <div class="issue-modal">
    <div class="issue-modal-head">
      <h3 id="issueModalTitle">이슈 목록</h3>
      <button class="issue-modal-close" onclick="closeIssueModal()">✕</button>
    </div>
    <div class="issue-modal-body" id="issueModalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ★★★ CONFIG — 반드시 채워야 작동합니다 (batch.html과 동일한 값) ★★★
// ═══════════════════════════════════════════════════════════
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbykK9DWjem9ORHxfR_mpdZl5DVh-en0D6JpCdIuel305QmfqxoNU_NqSnjkhFk401hI/exec',
};
const GAS_READY = CONFIG.GAS_URL.startsWith('https://script.google.com/');
const POLL_MS = 8000; // 8초마다 새로고침

async function gasQuery(op, params){
  if(!GAS_READY) return { ok:false, error:'GAS_URL 미설정' };
  try{
    const qs = new URLSearchParams(Object.assign({op}, params||{})).toString();
    const res = await fetch(`${CONFIG.GAS_URL}?${qs}`);
    return await res.json();
  }catch(e){
    console.error('gasQuery failed:', op, e);
    return { ok:false, error:String(e) };
  }
}

let currentBatchId = null;
let prevStatus = {}; // slotNum -> 'waiting'|'active'|'done' (완료 순간 감지용 flash 처리)

function fmtClock(){
  const d = new Date();
  document.getElementById('clock').textContent =
    [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}
setInterval(fmtClock, 1000); fmtClock();

function shipLabel(v){ return v || '-'; }
// ★ 2026-07-13: UPS/PU/TK가 아닌 값이 들어와도 스타일이 깨지지 않도록 안전하게 클래스 결정
function shipClass(v){
  return (v === 'UPS' || v === 'PU' || v === 'TK') ? 'ship-' + v : 'ship-other';
}

let _slotsByInvoice = {}; // ★ 2026-07-16 신규: 이슈 뱃지 클릭 시 상세 조회용

function cardHtml(slot){
  if(!slot){
    return `<div class="card"><div class="card-empty">비어있음</div></div>`;
  }
  const pct = slot.totalQty > 0 ? Math.min(100, slot.scanned / slot.totalQty * 100) : 0;
  const flashClass = (prevStatus[slot.slotNum] && prevStatus[slot.slotNum] !== 'done' && slot.status === 'done') ? ' flash' : '';
  const numLabel = /^\d+$/.test(String(slot.slotNum)) ? String(slot.slotNum).padStart(2,'0') : String(slot.slotNum);
  // ★ 2026-07-16 신규: 이슈(EXP/NF/Damaged/OOS)가 하나라도 있으면 뱃지 표시.
  //   클릭하면 어떤 바코드가 몇 개 빠졌는지 상세 목록 팝업.
  const issueBadge = slot.issueQty > 0
    ? `<span class="card-issue-badge" data-invoice="${slot.invoice}">⚠ ${slot.issueQty.toLocaleString()}</span>`
    : '';
  return `<div class="card ${slot.status}${flashClass}">
    <div class="card-top">
      <span class="card-slot">${numLabel}</span>
      <div class="card-top-right">
        ${issueBadge}
        <span class="card-ship ${shipClass(slot.shipVia)}">${shipLabel(slot.shipVia)}</span>
      </div>
    </div>
    <div class="card-cust">${slot.customer || ''}</div>
    <div class="card-bottom">
      <div class="card-metarow">
        <span class="card-sku">SKU ${slot.doneSku||0}/${slot.totalSku||0}</span>
        <span>${slot.scanned.toLocaleString()} / ${slot.totalQty.toLocaleString()} pcs</span>
      </div>
      <div class="card-bar"><div style="width:${pct}%"></div></div>
      <div class="card-done-tag">✓ 완료 · 패킹 이동</div>
    </div>
  </div>`;
}

// ★ 2026-07-16 신규 — 이슈 뱃지 클릭 시 상세 팝업
function openIssueModal(invoice){
  const slot = _slotsByInvoice[invoice];
  if(!slot || !slot.issues || slot.issues.length === 0) return;
  const reasonLabel = {EXP:'EXP · 유통기한', NF:'NF · 재고없음', DMG:'DMG · 파손', OOS:'OOS · 품절'};
  const rowsHtml = slot.issues.map(i => `
    <div class="issue-modal-row">
      <div class="issue-modal-row-top">
        <span class="issue-modal-reason">${reasonLabel[i.reason] || i.reason}</span>
        <span class="issue-modal-qty">${Number(i.qty).toLocaleString()}pcs</span>
      </div>
      <div class="issue-modal-name">${i.name || i.sku || ''}</div>
      <div class="issue-modal-meta">바코드 ${i.barcode || '-'} · ${i.worker || '-'} · ${(i.time||'').slice(5,16)}</div>
      ${i.note ? `<div class="issue-modal-note">"${i.note}"</div>` : ''}
    </div>`).join('');
  document.getElementById('issueModalTitle').textContent = `${slot.customer} · 이슈 ${slot.issues.length}건`;
  document.getElementById('issueModalBody').innerHTML = rowsHtml;
  document.getElementById('issueModalOverlay').classList.add('open');
}
function closeIssueModal(){
  document.getElementById('issueModalOverlay').classList.remove('open');
}
document.addEventListener('click', e => {
  const badge = e.target.closest('.card-issue-badge');
  if(badge){ openIssueModal(badge.dataset.invoice); return; }
  if(e.target.id === 'issueModalOverlay') closeIssueModal();
});

function renderBoard(slots){
  const board = document.getElementById('board');
  // ★ 2026-07-16 신규: 이슈 뱃지 클릭 시 참조할 수 있도록 invoice 기준으로 캐싱
  _slotsByInvoice = {};
  (slots || []).forEach(s => { if(s.invoice) _slotsByInvoice[s.invoice] = s; });
  if(!slots || slots.length === 0){
    board.innerHTML = `<div class="empty-state"><h2>오늘의 배치를 기다리는 중...</h2><p>슬롯이 배정되면 여기 자동으로 표시됩니다</p></div>`;
    return;
  }
  const large = slots.filter(s => s.slotNum <= 15).sort((a,b) => a.slotNum - b.slotNum);
  const small = slots.filter(s => s.slotNum > 15).sort((a,b) => a.slotNum - b.slotNum);

  let html = '';
  if(large.length){
    html += `<div class="zone-label">대량 오더 구역 · SLOT 01-15</div><div class="grid">`;
    for(let n=1; n<=15; n++){
      const s = large.find(x => x.slotNum === n);
      html += cardHtml(s);
    }
    html += `</div>`;
  }
  if(small.length){
    html += `<div class="zone-label">소량 오더 구역 · SLOT 16-30</div><div class="grid small">`;
    for(let n=16; n<=30; n++){
      const s = small.find(x => x.slotNum === n);
      html += cardHtml(s);
    }
    html += `</div>`;
  }

  // ★ 2026-07-13 신규: 30번을 초과하는 슬롯(31, 32... 또는 "임시A" 같은
  //   매니저 수동 배정 라벨)은 기존엔 TV 화면에서 통째로 누락됐음.
  //   고객사가 30개를 넘는 배치(예: 47개 고객사)에서 작업자가 31번째부터는
  //   TV로 확인할 방법이 아예 없던 문제 — 여기 세번째 구역으로 추가.
  const overflow = slots.filter(s => !(Number(s.slotNum) >= 1 && Number(s.slotNum) <= 30));
  overflow.sort((a,b) => String(a.slotNum).localeCompare(String(b.slotNum), undefined, {numeric:true}));
  if(overflow.length){
    html += `<div class="zone-label">추가 배정 구역 · 31번 이상 / 수동 배정 (${overflow.length}개)</div><div class="grid small">`;
    overflow.forEach(s => { html += cardHtml(s); });
    html += `</div>`;
  }

  board.innerHTML = html;

  // 완료 상태 기록 갱신 (다음 폴링에서 flash 판단용)
  const next = {};
  slots.forEach(s => { next[s.slotNum] = s.status; });
  prevStatus = next;
}

async function pollOnce(){
  if(!GAS_READY){
    document.getElementById('emptyMsg').textContent = 'CONFIG.GAS_URL이 설정되지 않았습니다';
    return;
  }
  // 배치ID 아직 모르면 오늘자 배치부터 찾기
  if(!currentBatchId){
    const b = await gasQuery('getBatch', {});
    if(!b.ok || !b.batch){
      document.getElementById('liveDot').className = 'status-dot off';
      document.getElementById('batchLabel').innerHTML = '<span class="status-dot off"></span>오늘 진행중인 배치 없음';
      return;
    }
    currentBatchId = b.batch.batchId;
    document.getElementById('batchLabel').innerHTML =
      `<span class="status-dot live" id="liveDot"></span>배치 ${currentBatchId} · ${b.batch.date}`;
  }

  const res = await gasQuery('getSlotProgress', { batchId: currentBatchId });
  if(!res.ok){
    document.getElementById('liveDot').className = 'status-dot off';
    return;
  }
  document.getElementById('liveDot').className = 'status-dot live';
  document.getElementById('doneCount').textContent = `${res.doneCount} / ${res.totalCount}`;
  document.getElementById('doneBar').style.width =
    (res.totalCount > 0 ? (res.doneCount / res.totalCount * 100) : 0) + '%';
  renderBoard(res.slots);
}

pollOnce();
setInterval(pollOnce, POLL_MS);
</script>
</body>
</html>
