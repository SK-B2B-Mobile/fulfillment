<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Fulfillment · 총량피킹 현황판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05070D; --surface:#0D1220; --surface2:#131B30;
  --border:#212B45;
  --border2:#2A3555;
  --text:#EDF1F9; --text-dim:#8A93AC;
  --amber:#F59E0B; --amber-bg:rgba(245,158,11,0.12);
  --green:#10D97E; --green-bg:rgba(16,217,126,0.12);
  --gray:#3A4560; --gray-bg:rgba(58,69,96,0.25);
  --sans:'Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100%; overflow:hidden;}

/* ═══════════════ 상단 헤더 ═══════════════ */
.topbar{display:flex; align-items:center; justify-content:space-between; padding:22px 40px; border-bottom:2px solid var(--border); background:var(--surface);}
.tb-left{display:flex; align-items:center; gap:20px;}
.tb-logo{width:52px; height:52px; border-radius:12px; background:linear-gradient(135deg,#8B5CF6,#3B82F6); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:22px;}
.tb-title{font-size:26px; font-weight:800; letter-spacing:-0.01em;}
.tb-sub{font-family:var(--mono); font-size:14px; color:var(--text-dim); margin-top:2px;}
.tb-right{display:flex; align-items:center; gap:36px;}
.tb-stat{text-align:right;}
.tb-stat-label{font-family:var(--mono); font-size:12px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase;}
.tb-stat-value{font-family:var(--mono); font-size:34px; font-weight:800; line-height:1.1;}
.tb-clock{font-family:var(--mono); font-size:30px; font-weight:700; color:var(--text-dim); min-width:200px; text-align:right;}
.tb-progress-outer{width:280px;}
.tb-progress-bar{height:10px; background:var(--surface2); border-radius:5px; overflow:hidden; margin-top:6px;}
.tb-progress-bar > div{height:100%; background:linear-gradient(90deg,var(--amber),var(--green)); transition:width 0.6s;}

.status-dot{width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:8px;}
.status-dot.live{background:var(--green); box-shadow:0 0 12px var(--green);}
.status-dot.off{background:var(--gray);}
.status-dot.manual{background:var(--amber); box-shadow:0 0 12px var(--amber);}

/* ★ 2026-07-23 신규 — TV 자체 "다른 배치 조회" 버튼/드롭다운
   (batch.html의 활성 배치 전환과 별개 · 여기서 배치를 골라도
   다른 기기/작업자 폰에는 전혀 영향 없음, TV 혼자만 조회) */
.tb-switch-wrap{position:relative; margin-left:14px;}
.tb-switch-btn{font-family:var(--sans); font-size:13px; font-weight:700; color:var(--text-dim); background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 14px; cursor:pointer;}
.tb-switch-btn:hover{background:var(--border); color:var(--text);}
.tb-switch-dd{display:none; position:absolute; top:calc(100% + 8px); left:0; z-index:200; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px; min-width:340px; box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.tb-switch-dd.open{display:block;}
.tb-switch-row{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 8px; border-radius:8px; cursor:pointer;}
.tb-switch-row:hover{background:var(--surface2);}
.tb-switch-row .tb-sw-id{font-family:var(--mono); font-weight:800; font-size:14px;}
.tb-switch-row .tb-sw-meta{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:2px;}
.tb-switch-row .tb-sw-tag{font-size:10px; font-weight:800; padding:2px 7px; border-radius:5px; white-space:nowrap;}
.tb-switch-empty{padding:12px 8px; font-size:12px; color:var(--text-dim);}
.manual-banner{display:none; align-items:center; gap:10px; background:var(--amber-bg); border:1px solid var(--amber); color:var(--amber); font-family:var(--mono); font-weight:700; font-size:13px; padding:8px 16px; border-radius:8px; margin-top:8px;}
.manual-banner.show{display:flex;}
.manual-banner button{font-family:var(--sans); font-size:12px; font-weight:700; background:none; border:1px solid var(--amber); color:var(--amber); border-radius:6px; padding:4px 10px; cursor:pointer;}
.manual-banner button:hover{background:var(--amber); color:#1a1300;}

/* ═══════════════ 슬롯 그리드 ═══════════════ */
.board{padding:26px 36px; height:calc(100vh - 108px); overflow-y:auto;}
.zone-label{font-family:var(--mono); font-size:15px; color:var(--text-dim); letter-spacing:0.1em; margin:18px 0 12px; text-transform:uppercase;}
.zone-label:first-child{margin-top:0;}
.grid{display:grid; grid-template-columns:repeat(5, 1fr); gap:16px;}
.grid.small{grid-template-columns:repeat(5, 1fr);}

.card{background:var(--surface); border:2px solid var(--border); border-radius:16px; padding:18px 20px; min-height:190px; display:flex; flex-direction:column; transition:all 0.4s;}
.card.waiting{opacity:0.55;}
.card.active{border-color:var(--amber); background:var(--amber-bg); animation:pulse 1.5s ease-in-out infinite;}
/* ★ 2026-07-13 변경: 완료 슬롯을 테두리만 초록으로 강조하던 것에서, 칸 전체를
   초록색으로 꽉 채우도록 변경 — 멀리서도(TV 화면 특성상) 한눈에 "다 됐다"가
   확 들어오도록. 텍스트는 초록 배경 위에서 잘 읽히는 진한 색으로 전부 맞춤. */
.card.done{border-color:var(--green); background:var(--green);}
.card.flash{animation:flashDone 1.8s ease-out 2;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.4);} 50%{box-shadow:0 0 0 10px rgba(245,158,11,0);}}
@keyframes flashDone{0%{box-shadow:0 0 40px var(--green);} 100%{box-shadow:0 0 0 rgba(16,217,126,0);}}

.card-top{display:flex; justify-content:space-between; align-items:flex-start;}
.card-slot{font-family:var(--mono); font-size:48px; font-weight:800; color:var(--text-dim);}
.card.active .card-slot{color:var(--amber);}
.card.done .card-slot{color:#04140D;}
.card-ship{font-family:var(--mono); font-size:19px; font-weight:800; padding:6px 12px; border-radius:6px; letter-spacing:0.04em;}
/* ★ 2026-07-13 신규: 배송타입(UPS/PU/TK)별 색상 구분 — batch.html과 동일한 배색 사용 */
.card-ship.ship-UPS{background:rgba(139,92,246,0.18); color:#B39CFF;}
.card-ship.ship-PU{background:rgba(34,211,238,0.18); color:#67E4F5;}
.card-ship.ship-TK{background:rgba(245,158,11,0.18); color:#FBBF4E;}
.card-ship.ship-other{background:rgba(58,69,96,0.35); color:var(--text-dim);}
.card.done .card-ship{background:rgba(4,20,13,0.18); color:#04140D;}
.card-cust{font-size:30px; font-weight:700; margin-top:10px; line-height:1.2; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
.card.done .card-cust{color:#04140D;}
/* ★ 2026-07-23 신규 — 인보이스 번호는 실물 박스 라벨과 대조하는 용도라 TV에도 필요하다는
   현장 요청으로 추가. card-cust(고객사명)보다는 작지만, 다른 메타 정보보다는 눈에 띄게. */
.card-invoice{font-family:var(--mono); font-size:20px; font-weight:800; color:var(--text-dim); margin-top:2px; letter-spacing:0.02em;}
.card.done .card-invoice{color:#04140D; opacity:0.85;}
.card-bottom{margin-top:12px;}
.card-qty{font-family:var(--mono); font-size:26px; font-weight:700; color:var(--text-dim); margin-bottom:8px;}
.card.active .card-qty, .card.done .card-qty{color:var(--text);}
.card.done .card-qty{color:#04140D;}
.card-metarow{display:flex; justify-content:space-between; font-family:var(--mono); font-size:24px; font-weight:700; color:var(--text-dim); margin-bottom:8px;}
.card.active .card-metarow, .card.done .card-metarow{color:var(--text);}
.card.done .card-metarow{color:#04140D;}
.card-sku{opacity:0.85;}
.card-bar{height:11px; background:rgba(255,255,255,0.08); border-radius:5px; overflow:hidden;}
.card-bar > div{height:100%; background:var(--amber); transition:width 0.5s;}
.card.done .card-bar{background:rgba(4,20,13,0.18);}
.card.done .card-bar > div{background:#04140D;}
/* ★ 2026-07-23 신규 — "패킹존 이동" 체크박스 (구 .card-done-tag 정적 문구를 대체).
   clearSlot(슬롯비우기)과 무관한 순수 표시용 상태. 체크하면 카드 전체가 블루로
   바뀌어서, 초록(=완료했지만 아직 패킹존으로 안 옮김, 신경 써야 함)과 한눈에 구분됨. */
.card-pack-check{display:none; align-items:center; gap:8px; cursor:pointer; margin-top:10px;}
.card.done .card-pack-check{display:flex;}
.card.done .card-pack-check .label{font-family:var(--mono); font-size:18px; font-weight:800; color:#04140D;}
.card.done.moved{background:#2E0E22; border-color:#EC4899;}
.card.done.moved .card-slot, .card.done.moved .card-cust, .card.done.moved .card-invoice,
.card.done.moved .card-metarow, .card.done.moved .card-sku{color:var(--text);}
.card-pack-check .box{width:22px; height:22px; border-radius:5px; border:2px solid #04140D; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.card.done.moved .card-pack-check .box{border-color:#EC4899; background:#EC4899;}
.card-pack-check .box svg{display:none; width:14px; height:14px;}
.card.done.moved .card-pack-check .box svg{display:block;}
.card.done.moved .card-pack-check .label{color:#EC4899;}
.card-empty{display:flex; align-items:center; justify-content:center; height:100%; font-family:var(--mono); font-size:20px; color:var(--text-dim); opacity:0.4;}

.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; height:70vh; gap:16px;}
.empty-state h2{font-size:28px; color:var(--text-dim);}
.empty-state p{font-family:var(--mono); font-size:16px; color:var(--text-dim); opacity:0.6;}

/* ★ 2026-07-16 신규 — 이슈(EXP/NF/Damaged/OOS) 뱃지 + 상세 모달 */
.card-top-right{display:flex; align-items:center; gap:8px;}
.card-issue-badge{font-family:var(--mono); font-size:16px; font-weight:800; color:#FF4D6D; background:rgba(255,77,109,0.15); border:1.5px solid rgba(255,77,109,0.5); border-radius:8px; padding:3px 9px; cursor:pointer;}
.card-issue-badge:hover{background:rgba(255,77,109,0.28);}
.card.done .card-issue-badge{color:#04140D; background:rgba(4,20,13,0.18); border-color:rgba(4,20,13,0.4);}

.issue-modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:100; align-items:center; justify-content:center;}
.issue-modal-overlay.open{display:flex;}
.issue-modal{background:var(--surface); border:2px solid var(--border); border-radius:18px; width:min(640px, 90vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;}
.issue-modal-head{display:flex; justify-content:space-between; align-items:center; padding:22px 26px; border-bottom:2px solid var(--border);}
.issue-modal-head h3{font-size:24px; font-weight:800;}
.issue-modal-close{background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); width:38px; height:38px; border-radius:10px; font-size:16px; cursor:pointer;}
.issue-modal-body{padding:18px 26px; overflow-y:auto; display:flex; flex-direction:column; gap:12px;}
.issue-modal-row{background:rgba(255,77,109,0.06); border:1px solid rgba(255,77,109,0.3); border-radius:12px; padding:14px 18px;}
.issue-modal-row-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.issue-modal-reason{font-family:var(--mono); font-size:15px; font-weight:800; color:#FF4D6D;}
.issue-modal-qty{font-family:var(--mono); font-size:20px; font-weight:800;}
.issue-modal-name{font-size:17px; font-weight:700; margin-bottom:4px;}
.issue-modal-meta{font-family:var(--mono); font-size:13px; color:var(--text-dim);}
.issue-modal-note{margin-top:6px; font-size:14px; color:var(--text-dim); font-style:italic;}
.issue-modal-edit-btn{margin-top:10px; width:100%; padding:9px; background:none; border:1px solid var(--border2); border-radius:8px; color:var(--text-dim); font-size:13px; font-weight:700; cursor:pointer;}
.issue-modal-edit-btn:hover{background:rgba(255,255,255,0.06); color:var(--text);}

/* ★ 2026-07-23 신규 — TV에서도 카드를 클릭해 이슈를 조회/추가할 수 있게 함
   (기존엔 이미 이슈가 있는 카드의 배지를 눌러야만 "조회"만 가능했음) */
.card{cursor:pointer;}
.issue-modal-empty{font-size:14px; color:var(--text-dim); text-align:center; padding:10px 0;}
.issue-new-form{background:rgba(255,255,255,0.03); border:1px solid var(--border2); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:10px; margin-top:4px;}
.issue-new-form-title{font-size:13px; color:var(--text-dim); font-weight:800;}
.issue-new-form label{font-size:12px; color:var(--text-dim); font-weight:700;}
.issue-new-form select, .issue-new-form input{width:100%; padding:10px 12px; background:var(--surface); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:14px; font-family:var(--sans); margin-top:4px;}
.issue-new-form-row{display:flex; gap:10px;}
.issue-new-form-row > div{flex:1;}
.issue-new-form-submit{margin-top:2px; padding:12px; background:rgba(255,77,109,0.15); border:1px solid #FF4D6D; color:#FF4D6D; border-radius:8px; font-size:14px; font-weight:800; cursor:pointer;}
.issue-new-form-submit:hover{background:rgba(255,77,109,0.25);}
.issue-edit-form{margin-top:10px; display:flex; flex-direction:column; gap:8px;}
.issue-edit-form select, .issue-edit-form input{width:100%; padding:9px 10px; background:var(--bg); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:14px; box-sizing:border-box;}
.issue-edit-actions{display:flex; gap:8px;}
.issue-edit-cancel, .issue-edit-save{flex:1; padding:9px; border-radius:6px; border:none; font-weight:700; font-size:13px; cursor:pointer;}
.issue-edit-cancel{background:var(--surface2); color:var(--text-dim); border:1px solid var(--border2);}
.issue-edit-save{background:#FF4D6D; color:#fff;}
.issue-edit-save:disabled{opacity:0.6;}
.issue-edit-delete{margin-top:4px; width:100%; padding:8px; background:none; border:1px dashed rgba(255,77,109,0.4); border-radius:6px; color:#FF4D6D; font-size:12px; font-weight:600; cursor:pointer;}
.issue-edit-delete:hover{background:rgba(255,77,109,0.1);}
.issue-edit-delete:disabled{opacity:0.6;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-logo">SK</div>
    <div>
      <div class="tb-title">총량피킹 현황판</div>
      <div class="tb-sub" id="batchLabel"><span class="status-dot off" id="liveDot"></span>연결 대기중...</div>
      <div class="manual-banner" id="manualBanner">
        🔍 다른 배치 조회 중 (실시간 아님) <button id="btnBackToLive">실시간으로 돌아가기</button>
      </div>
    </div>
    <div class="tb-switch-wrap">
      <button class="tb-switch-btn" id="btnSwitchBatchTV">⇄ 다른 배치</button>
      <div class="tb-switch-dd" id="switchBatchDropdownTV"></div>
    </div>
  </div>
  <div class="tb-right">
    <div class="tb-stat">
      <div class="tb-stat-label">완료 슬롯</div>
      <div class="tb-stat-value" id="doneCount">-- / --</div>
      <div class="tb-progress-outer"><div class="tb-progress-bar"><div id="doneBar" style="width:0%"></div></div></div>
    </div>
    <div class="tb-clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="board" id="board">
  <div class="empty-state">
    <h2>오늘의 배치를 기다리는 중...</h2>
    <p id="emptyMsg">CONFIG.GAS_URL 확인 중</p>
  </div>
</div>

<!-- ★ 2026-07-16 신규 — 이슈(⚠) 뱃지 클릭 시 상세 목록 모달 -->
<div class="issue-modal-overlay" id="issueModalOverlay">
  <div class="issue-modal">
    <div class="issue-modal-head">
      <h3 id="issueModalTitle">이슈 목록</h3>
      <button class="issue-modal-close" onclick="closeIssueModal()">✕</button>
    </div>
    <div class="issue-modal-body" id="issueModalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ★★★ CONFIG — 반드시 채워야 작동합니다 (batch.html과 동일한 값) ★★★
// ═══════════════════════════════════════════════════════════
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbykK9DWjem9ORHxfR_mpdZl5DVh-en0D6JpCdIuel305QmfqxoNU_NqSnjkhFk401hI/exec',
};
const GAS_READY = CONFIG.GAS_URL.startsWith('https://script.google.com/');
const POLL_MS = 8000; // 8초마다 새로고침

async function gasQuery(op, params){
  if(!GAS_READY) return { ok:false, error:'GAS_URL 미설정' };
  try{
    // ★ 2026-07-17 수정: TV처럼 오래 켜두는 화면에서 브라우저가 예전 응답을
    //   캐싱해서 재사용하는 바람에 데이터가 안 바뀌는 것처럼 보이던 문제 수정.
    //   매번 다른 타임스탬프를 붙이고, fetch 자체도 캐시를 쓰지 말라고 명시.
    const qs = new URLSearchParams(Object.assign({op, _ts: Date.now()}, params||{})).toString();
    const res = await fetch(`${CONFIG.GAS_URL}?${qs}`, { cache: 'no-store' });
    return await res.json();
  }catch(e){
    console.error('gasQuery failed:', op, e);
    return { ok:false, error:String(e) };
  }
}
// ★ 2026-07-22 신규 — 이슈 되돌리기(undoIssue) 등 저장/변경 작업용 POST 호출
async function gasCall(op, data){
  if(!GAS_READY) return { ok:false, error:'GAS_URL 미설정' };
  try{
    const fd = new FormData();
    fd.append('op', op);
    fd.append('data', JSON.stringify(data || {}));
    // ★ 2026-07-22 신규: 타임아웃이 없어서 서버 응답이 늦으면 "처리 중..."
    //   상태로 무한정 멈춰있던 문제 수정 — 20초 넘으면 실패로 보고 사용자가
    //   다시 시도할 수 있게 함.
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 20000);
    const res = await fetch(CONFIG.GAS_URL, { method:'POST', body: fd, signal: controller.signal });
    clearTimeout(timer);
    return await res.json();
  }catch(e){
    console.error('gasCall failed:', op, e);
    const msg = (e && e.name === 'AbortError') ? '서버 응답이 너무 늦어서 중단했습니다(20초 초과). 다시 시도해주세요.' : String(e);
    return { ok:false, error: msg };
  }
}

let currentBatchId = null;
let prevStatus = {}; // slotNum -> 'waiting'|'active'|'done' (완료 순간 감지용 flash 처리)

// ★ 2026-07-23 신규 — TV 자체 "다른 배치 조회" 모드.
// null이면 평소대로 getActiveBatch(매니저가 batch.html에서 정한 활성 배치)를 실시간으로 따라감.
// 값이 있으면 그 배치만 고정으로 조회하며, getActiveBatch 폴링은 건너뜀
// (다른 기기에는 절대 영향 없음 — setActiveBatch를 호출하지 않는 순수 조회 전용).
let manualBatchOverride = null; // { batchId, date } | null

function fmtClock(){
  const d = new Date();
  document.getElementById('clock').textContent =
    [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}
setInterval(fmtClock, 1000); fmtClock();

function shipLabel(v){ return v || '-'; }
// ★ 2026-07-13: UPS/PU/TK가 아닌 값이 들어와도 스타일이 깨지지 않도록 안전하게 클래스 결정
function shipClass(v){
  return (v === 'UPS' || v === 'PU' || v === 'TK') ? 'ship-' + v : 'ship-other';
}

let _slotsByInvoice = {}; // ★ 2026-07-16 신규: 이슈 뱃지 클릭 시 상세 조회용

// ★ 2026-07-23 신규 — "패킹존 이동" 체크박스 토글. clearSlot(슬롯비우기)과 무관한
// 순수 표시용 상태 변경이라, 서버에 저장만 하고 슬롯 재배정 로직은 전혀 안 건드림.
async function togglePackingMoved(invoice){
  const slot = _slotsByInvoice[invoice];
  if(!slot) return;
  const next = !slot.movedToPacking;
  slot.movedToPacking = next; // 낙관적 갱신 — 서버 응답 기다리지 않고 즉시 화면 반영
  renderBoard(Object.values(_slotsByInvoice));
  const res = await gasCall('setPackingMoved', { batchId: currentBatchId, invoice, moved: next });
  if(!res.ok){
    slot.movedToPacking = !next; // 실패하면 원상복구
    renderBoard(Object.values(_slotsByInvoice));
  }
}

function cardHtml(slot){
  if(!slot){
    return `<div class="card"><div class="card-empty">비어있음</div></div>`;
  }
  // ★ 2026-07-23 신규 — 예전엔 여기서 slot.totalQty(이슈 반영 전 원래 수량)를 분모로
  //   썼는데, 완료(초록) 판정 자체는 서버가 effectiveTotal(이슈로 빠진 수량 뺀 실제
  //   필요수량) 기준으로 이미 계산해서 보내주고 있어서, "초록불인데 숫자는 100%가
  //   아닌" 것처럼 보이거나 batch.html(웹)과 분모 숫자가 서로 달라 혼란스러웠음.
  //   이제 TV도 effectiveTotal을 분모로 써서 웹과 항상 같은 숫자를 보여줌.
  const target = (slot.effectiveTotal !== undefined && slot.effectiveTotal !== null) ? slot.effectiveTotal : slot.totalQty;
  const pct = target > 0 ? Math.min(100, slot.scanned / target * 100) : 0;
  const flashClass = (prevStatus[slot.slotNum] && prevStatus[slot.slotNum] !== 'done' && slot.status === 'done') ? ' flash' : '';
  const numLabel = /^\d+$/.test(String(slot.slotNum)) ? String(slot.slotNum).padStart(2,'0') : String(slot.slotNum);
  // ★ 2026-07-16 신규: 이슈(EXP/NF/Damaged/OOS)가 하나라도 있으면 뱃지 표시.
  //   클릭하면 어떤 바코드가 몇 개 빠졌는지 상세 목록 팝업.
  const issueBadge = slot.issueQty > 0
    ? `<span class="card-issue-badge" data-invoice="${slot.invoice}">⚠ ${slot.issueQty.toLocaleString()}</span>`
    : '';
  return `<div class="card ${slot.status}${slot.movedToPacking?' moved':''}${flashClass}" data-invoice="${slot.invoice}">
    <div class="card-top">
      <span class="card-slot">${numLabel}</span>
      <div class="card-top-right">
        ${issueBadge}
        <span class="card-ship ${shipClass(slot.shipVia)}">${shipLabel(slot.shipVia)}</span>
      </div>
    </div>
    <div class="card-cust">${slot.customer || ''}</div>
    <div class="card-invoice">${slot.invoice || ''}</div>
    <div class="card-bottom">
      <div class="card-metarow">
        <span class="card-sku">SKU ${slot.doneSku||0}/${slot.totalSku||0}</span>
        <span>${slot.scanned.toLocaleString()} / ${target.toLocaleString()} pcs</span>
      </div>
      <div class="card-bar"><div style="width:${pct}%"></div></div>
      <div class="card-pack-check" data-pack-invoice="${slot.invoice}">
        <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#04140D" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg></span>
        <span class="label">${slot.movedToPacking ? '패킹존 이동 완료' : '완료 · 패킹존 이동'}</span>
      </div>
    </div>
  </div>`;
}

// ★ 2026-07-16 신규 — 이슈 뱃지 클릭 시 상세 팝업
const ISSUE_REASON_OPTS = [
  {v:'EXP', label:'EXP · 유통기한'}, {v:'NF', label:'NF · 재고없음'},
  {v:'DMG', label:'DMG · 파손'}, {v:'OOS', label:'OOS · 품절'},
  {v:'SKUMIS', label:'SKUMIS · SKU 불일치'},
];
// ★ 2026-07-23 신규 — 배치 전체 아이템(고객사별 SKU 목록)을 한 번만 받아서 캐싱.
//   "새 이슈 등록" 폼의 SKU 드롭다운을 채우는 데만 씀 (진행률 폴링과는 별개).
let _batchItemsCache = { batchId: null, byInvoice: {} };
async function ensureBatchItemsLoaded(){
  if(_batchItemsCache.batchId === currentBatchId) return; // 이미 이 배치 걸로 캐싱됨
  const res = await gasQuery('getBatch', { batchId: currentBatchId });
  const byInvoice = {};
  if(res.ok && Array.isArray(res.customers)){
    res.customers.forEach(c => { byInvoice[c.invoice] = c.items || []; });
  }
  _batchItemsCache = { batchId: currentBatchId, byInvoice };
}

async function openIssueModal(invoice){
  const slot = _slotsByInvoice[invoice];
  if(!slot) return;
  _issueModalInvoice = invoice;
  document.getElementById('issueModalTitle').textContent = `${slot.customer} · 이슈 ${(slot.issues||[]).length}건`;
  document.getElementById('issueModalBody').innerHTML = `<div class="issue-modal-empty">불러오는 중...</div>`;
  document.getElementById('issueModalOverlay').classList.add('open');
  await ensureBatchItemsLoaded();
  renderIssueModalBody();
}
function renderIssueModalBody(){
  const invoice = _issueModalInvoice;
  const slot = _slotsByInvoice[invoice];
  if(!slot) return;
  const reasonLabel = {EXP:'EXP · 유통기한', NF:'NF · 재고없음', DMG:'DMG · 파손', OOS:'OOS · 품절', SKUMIS:'SKUMIS · SKU 불일치'};
  const issues = slot.issues || [];
  const rowsHtml = issues.length ? issues.map((i, idx) => `
    <div class="issue-modal-row" id="issueRow-${idx}">
      <div class="issue-modal-row-top">
        <span class="issue-modal-reason">${reasonLabel[i.reason] || i.reason}</span>
        <span class="issue-modal-qty">${Number(i.qty).toLocaleString()}pcs</span>
      </div>
      <div class="issue-modal-name">${i.name || i.sku || ''}</div>
      <div class="issue-modal-meta">바코드 ${i.barcode || '-'} · ${i.worker || '-'} · ${(i.time||'').slice(5,16)}</div>
      ${i.note ? `<div class="issue-modal-note">"${i.note}"</div>` : ''}
      <button class="issue-modal-edit-btn" data-idx="${idx}">✎ 수정</button>
      <div class="issue-edit-form" id="issueEditForm-${idx}" style="display:none">
        <select id="issueEditReason-${idx}">
          ${ISSUE_REASON_OPTS.map(r => `<option value="${r.v}" ${r.v===i.reason?'selected':''}>${r.label}</option>`).join('')}
        </select>
        <input type="number" id="issueEditQty-${idx}" min="1" value="${i.qty}" placeholder="수량">
        <input type="text" id="issueEditNote-${idx}" value="${(i.note||'').replace(/"/g,'&quot;')}" placeholder="메모(선택)">
        <div class="issue-edit-actions">
          <button class="issue-edit-cancel" data-idx="${idx}">닫기</button>
          <button class="issue-edit-save" data-idx="${idx}" data-issue-id="${i.issueId}">저장</button>
        </div>
        <button class="issue-edit-delete" data-idx="${idx}" data-issue-id="${i.issueId}">🗑 이 이슈 전체 취소(삭제)</button>
      </div>
    </div>`).join('') : `<div class="issue-modal-empty">등록된 이슈 없음</div>`;

  // ★ 2026-07-23 신규 — "+ 새 이슈 등록" 폼: 스캔 시점이 아니어도(예: 나중에 실물
  //   확인하다 유통기한 지난 걸 발견) TV에서 바로 이슈를 등록할 수 있게 함.
  const items = _batchItemsCache.byInvoice[invoice] || [];
  const skuOptions = items.length
    ? items.map(it => `<option value="${it.barcode}" data-name="${(it.name||'').replace(/"/g,'&quot;')}" data-sku="${it.sku||''}">${it.name} (${it.sku}) · ${it.req_qty}pcs</option>`).join('')
    : '';
  const newFormHtml = `
    <div class="issue-new-form">
      <div class="issue-new-form-title">+ 새 이슈 등록</div>
      <div>
        <label>상품 (SKU)</label>
        <select id="newIssueSku">${skuOptions || '<option>상품 목록을 불러올 수 없습니다</option>'}</select>
      </div>
      <div class="issue-new-form-row">
        <div>
          <label>사유</label>
          <select id="newIssueReason">${ISSUE_REASON_OPTS.map(r => `<option value="${r.v}">${r.label}</option>`).join('')}</select>
        </div>
        <div>
          <label>수량</label>
          <input type="number" id="newIssueQty" min="1" placeholder="pcs">
        </div>
      </div>
      <div>
        <label>작업자(발견자)</label>
        <input type="text" id="newIssueWorker" placeholder="이름 입력">
      </div>
      <div>
        <label>메모(선택)</label>
        <input type="text" id="newIssueNote" placeholder="예: 검수 중 발견, 유통기한 2026-06-01">
      </div>
      <button class="issue-new-form-submit" id="newIssueSubmitBtn">⚠ 이슈 등록</button>
    </div>`;

  document.getElementById('issueModalTitle').textContent = `${slot.customer} · 이슈 ${issues.length}건`;
  document.getElementById('issueModalBody').innerHTML = rowsHtml + newFormHtml;
}
async function submitNewIssueFromBoard(){
  const invoice = _issueModalInvoice;
  const slot = _slotsByInvoice[invoice];
  if(!slot) return;
  const skuSel = document.getElementById('newIssueSku');
  const opt = skuSel.options[skuSel.selectedIndex];
  const barcode = skuSel.value;
  const name = opt ? opt.dataset.name : '';
  const sku = opt ? opt.dataset.sku : '';
  const reason = document.getElementById('newIssueReason').value;
  const qty = parseInt(document.getElementById('newIssueQty').value, 10);
  const worker = document.getElementById('newIssueWorker').value.trim();
  const note = document.getElementById('newIssueNote').value.trim();

  if(!barcode){ alert('상품을 선택하세요'); return; }
  if(!qty || qty < 1){ alert('수량을 정확히 입력해주세요'); return; }
  if(!worker){ alert('작업자(발견자)를 입력해주세요'); return; }

  const btn = document.getElementById('newIssueSubmitBtn');
  btn.disabled = true; btn.textContent = '등록 중...';
  const res = await gasCall('logIssue', {
    batchId: currentBatchId, worker: worker,
    barcode: barcode, sku: sku, name: name,
    invoice: invoice, customer: slot.customer,
    reason: reason, qty: qty, note: note,
  });
  if(res.ok){
    await pollOnce();
    if(_issueModalInvoice) renderIssueModalBody();
  } else {
    btn.disabled = false; btn.textContent = '⚠ 이슈 등록';
    alert('등록 실패: ' + (res.error || '알 수 없는 오류'));
  }
}
function closeIssueModal(){
  document.getElementById('issueModalOverlay').classList.remove('open');
  _issueModalInvoice = null;
}
let _issueModalInvoice = null; // ★ 2026-07-22 신규: 지금 열려있는 이슈 모달이 어느 고객사(invoice) 것인지

// ★ 2026-07-22 신규 — "✎ 수정": 잘못 입력한 이슈를 취소하는 게 아니라
//   사유/수량/메모를 그 자리에서 직접 고쳐서 저장. 저장하면 그 차이만큼
//   고객사의 완료 판정 기준(필요수량)도 자동으로 다시 계산됨.
async function saveIssueEdit(issueId, idx){
  const reason = document.getElementById(`issueEditReason-${idx}`).value;
  const qty = parseInt(document.getElementById(`issueEditQty-${idx}`).value, 10);
  const note = document.getElementById(`issueEditNote-${idx}`).value.trim();
  if(!qty || qty < 1){ alert('수량을 정확히 입력해주세요'); return; }
  const saveBtn = document.querySelector(`.issue-edit-save[data-idx="${idx}"]`);
  saveBtn.disabled = true;
  saveBtn.textContent = '저장 중...';
  const res = await gasCall('editIssue', { issueId, reason, qty, note });
  if(res.ok){
    await pollOnce(); // 최신 상태(완료 판정 등) 즉시 반영
    if(_issueModalInvoice) renderIssueModalBody(); // 모달도 수정된 값으로 다시 그림
  } else {
    saveBtn.disabled = false;
    saveBtn.textContent = '저장';
    alert('수정 실패: ' + (res.error || '알 수 없는 오류'));
  }
}

// ★ 2026-07-22 신규 — "🗑 이 이슈 전체 취소(삭제)": 값을 고치는 게 아니라
//   이 이슈 자체를 완전히 없던 일로 만듦. 취소하면 그 수량만큼 다시 고객사의
//   필요수량에 포함되어(완료 판정에서 다시 빠짐), 현황판이 정확한 상태로 갱신됨.
async function deleteIssueFromBoard(issueId, idx){
  if(!confirm('이 이슈를 완전히 취소하시겠습니까?\n다시 이 고객사의 필요수량에 포함되어 완료 처리되지 않은 상태로 돌아갑니다.\n(수량/사유만 고치려면 "닫기"를 누르고 값을 수정한 뒤 저장하세요)')) return;
  const delBtn = document.querySelector(`.issue-edit-delete[data-idx="${idx}"]`);
  delBtn.disabled = true;
  delBtn.textContent = '취소하는 중...';
  const res = await gasCall('undoIssue', { issueId });
  if(res.ok){
    await pollOnce(); // 최신 상태 즉시 반영
    if(_issueModalInvoice) renderIssueModalBody(); // 모달도 최신 목록으로 다시 그림(이 건은 빠짐)
  } else {
    delBtn.disabled = false;
    delBtn.textContent = '🗑 이 이슈 전체 취소(삭제)';
    alert('취소 실패: ' + (res.error || '알 수 없는 오류'));
  }
}

document.addEventListener('click', e => {
  // ★ 2026-07-23 신규: "패킹존 이동" 체크박스는 카드 안에 있지만 완전히 다른 동작
  //   (이슈 모달을 열지 않고 그 자리에서 바로 토글) — 카드 클릭 판정보다 먼저 처리.
  const packCheck = e.target.closest('.card-pack-check');
  if(packCheck){ togglePackingMoved(packCheck.dataset.packInvoice); return; }
  // ★ 2026-07-23 수정: 이슈 배지뿐 아니라 카드 전체 아무 곳이나 눌러도 모달이 열리도록 확장
  //   (이슈가 0건이어도 열려서 새로 등록할 수 있어야 하므로)
  const card = e.target.closest('.card[data-invoice]');
  if(card && !e.target.closest('.issue-modal, .issue-new-form')){ openIssueModal(card.dataset.invoice); return; }
  const editBtn = e.target.closest('.issue-modal-edit-btn');
  if(editBtn){
    const idx = editBtn.dataset.idx;
    document.getElementById(`issueEditForm-${idx}`).style.display = 'flex';
    editBtn.style.display = 'none';
    return;
  }
  const cancelBtn = e.target.closest('.issue-edit-cancel');
  if(cancelBtn){
    const idx = cancelBtn.dataset.idx;
    document.getElementById(`issueEditForm-${idx}`).style.display = 'none';
    document.querySelector(`.issue-modal-edit-btn[data-idx="${idx}"]`).style.display = '';
    return;
  }
  const saveBtn = e.target.closest('.issue-edit-save');
  if(saveBtn){ saveIssueEdit(saveBtn.dataset.issueId, saveBtn.dataset.idx); return; }
  const deleteBtn = e.target.closest('.issue-edit-delete');
  if(deleteBtn){ deleteIssueFromBoard(deleteBtn.dataset.issueId, deleteBtn.dataset.idx); return; }
  const newIssueBtn = e.target.closest('#newIssueSubmitBtn');
  if(newIssueBtn){ submitNewIssueFromBoard(); return; }
  if(e.target.id === 'issueModalOverlay') closeIssueModal();
});

function renderBoard(slots){
  const board = document.getElementById('board');
  // ★ 2026-07-16 신규: 이슈 뱃지 클릭 시 참조할 수 있도록 invoice 기준으로 캐싱
  _slotsByInvoice = {};
  (slots || []).forEach(s => { if(s.invoice) _slotsByInvoice[s.invoice] = s; });
  if(!slots || slots.length === 0){
    board.innerHTML = `<div class="empty-state"><h2>오늘의 배치를 기다리는 중...</h2><p>슬롯이 배정되면 여기 자동으로 표시됩니다</p></div>`;
    return;
  }
  const large = slots.filter(s => s.slotNum <= 15).sort((a,b) => a.slotNum - b.slotNum);
  const small = slots.filter(s => s.slotNum > 15).sort((a,b) => a.slotNum - b.slotNum);

  let html = '';
  if(large.length){
    html += `<div class="zone-label">대량 오더 구역 · SLOT 01-15</div><div class="grid">`;
    for(let n=1; n<=15; n++){
      const s = large.find(x => x.slotNum === n);
      html += cardHtml(s);
    }
    html += `</div>`;
  }
  if(small.length){
    html += `<div class="zone-label">소량 오더 구역 · SLOT 16-30</div><div class="grid small">`;
    for(let n=16; n<=30; n++){
      const s = small.find(x => x.slotNum === n);
      html += cardHtml(s);
    }
    html += `</div>`;
  }

  // ★ 2026-07-13 신규: 30번을 초과하는 슬롯(31, 32... 또는 "임시A" 같은
  //   매니저 수동 배정 라벨)은 기존엔 TV 화면에서 통째로 누락됐음.
  //   고객사가 30개를 넘는 배치(예: 47개 고객사)에서 작업자가 31번째부터는
  //   TV로 확인할 방법이 아예 없던 문제 — 여기 세번째 구역으로 추가.
  const overflow = slots.filter(s => !(Number(s.slotNum) >= 1 && Number(s.slotNum) <= 30));
  overflow.sort((a,b) => String(a.slotNum).localeCompare(String(b.slotNum), undefined, {numeric:true}));
  if(overflow.length){
    html += `<div class="zone-label">추가 배정 구역 · 31번 이상 / 수동 배정 (${overflow.length}개)</div><div class="grid small">`;
    overflow.forEach(s => { html += cardHtml(s); });
    html += `</div>`;
  }

  board.innerHTML = html;

  // 완료 상태 기록 갱신 (다음 폴링에서 flash 판단용)
  const next = {};
  slots.forEach(s => { next[s.slotNum] = s.status; });
  prevStatus = next;
}

async function pollOnce(){
  try{
    if(!GAS_READY){
      document.getElementById('emptyMsg').textContent = 'CONFIG.GAS_URL이 설정되지 않았습니다';
      return;
    }
    // ★ 2026-07-23 신규: 매니저가 TV에서 직접 "다른 배치"를 골라 조회 중이면
    //   (manualBatchOverride) 활성 배치 자동 추적을 건너뛰고 그 배치만 고정 조회.
    //   이 모드는 다른 기기(작업자 폰 등)에는 전혀 영향을 주지 않는 TV 전용 조회.
    if(manualBatchOverride){
      currentBatchId = manualBatchOverride.batchId;
      document.getElementById('batchLabel').innerHTML =
        `<span class="status-dot manual"></span>배치 ${currentBatchId} · ${manualBatchOverride.date}`;
    } else {
    // ★ 2026-07-23 신규: "오늘 배치"만 찾던 것을, 매니저가 서버에 기록해둔
    //   "활성 배치"를 우선 확인하도록 변경 — batch.html에서 매니저가 배치를
    //   새로 시작하거나 "이어서 작업하기"를 누르면 서버에 기록되는데, TV
    //   현황판도 그 기록을 그대로 따라감 (어제 배치든 오늘 배치든 무관).
    //   TV는 하루 종일 안 끄고 켜두는 경우가 많아서, 이미 배치를 하나 물고
    //   있어도 매 폴링(8초)마다 계속 재확인함 — 매니저가 중간에 다른 배치로
    //   전환하면 TV도 곧바로 자동으로 따라가게 하기 위함.
    const activeRes = await gasQuery('getActiveBatch', {});
    if(activeRes.ok && activeRes.batch && activeRes.batch.batchId !== currentBatchId){
      currentBatchId = activeRes.batch.batchId;
      document.getElementById('batchLabel').innerHTML =
        `<span class="status-dot live" id="liveDot"></span>배치 ${currentBatchId} · ${activeRes.batch.date}`;
    } else if(!currentBatchId){
      // 활성 배치 기록이 아직 없으면(아무도 안 정했으면) 예전처럼 오늘자 배치라도 확인
      const b = await gasQuery('getBatch', {});
      if(!b.ok || !b.batch){
        const dot0 = document.getElementById('liveDot');
        if(dot0) dot0.className = 'status-dot off';
        document.getElementById('batchLabel').innerHTML = '<span class="status-dot off"></span>진행중인 배치 없음';
        return;
      }
      currentBatchId = b.batch.batchId;
      document.getElementById('batchLabel').innerHTML =
        `<span class="status-dot live" id="liveDot"></span>배치 ${currentBatchId} · ${b.batch.date}`;
    }
    }

    const res = await gasQuery('getSlotProgress', { batchId: currentBatchId });
    if(!res.ok){
      const dot = document.getElementById('liveDot');
      if(dot) dot.className = 'status-dot off';
      return;
    }
    // ★ 2026-07-23 수정: manual 모드일 땐 batchLabel에 id='liveDot'인 도트가 없으므로
    //   (amber 'manual' 도트로 대체됨) null 체크 후 있을 때만 갱신.
    const dot = document.getElementById('liveDot');
    if(dot) dot.className = 'status-dot live';
    document.getElementById('doneCount').textContent = `${res.doneCount} / ${res.totalCount}`;
    document.getElementById('doneBar').style.width =
      (res.totalCount > 0 ? (res.doneCount / res.totalCount * 100) : 0) + '%';
    renderBoard(res.slots);
  }catch(e){
    // ★ 2026-07-17 신규: 폴링 중 예상 못한 오류가 나도 콘솔에만 남기고
    //   다음 8초 뒤 폴링은 그대로 이어지게 함(화면이 아예 멈추지 않도록)
    console.error('pollOnce failed:', e);
  }
}

pollOnce();
setInterval(pollOnce, POLL_MS);

// ═══════════════════════════════════════════════════════════
// ★ 2026-07-23 신규 — TV "다른 배치 조회" 드롭다운
// ─────────────────────────────────────────────────────────────
// batch.html의 "⇄ 다른 배치"와 이름은 같지만 동작은 완전히 다름:
// 여기서 배치를 골라도 setActiveBatch를 호출하지 않으므로
// 작업자 폰/다른 TV 등 어떤 기기에도 영향을 주지 않는 순수 조회 전용.
// (완료 처리된 배치는 목록에 안 뜸 — getOpenBatches가 미완료 배치만 반환)
// ═══════════════════════════════════════════════════════════
document.getElementById('btnSwitchBatchTV').onclick = async (e) => {
  e.stopPropagation();
  const dd = document.getElementById('switchBatchDropdownTV');
  if(dd.classList.contains('open')){ dd.classList.remove('open'); return; }

  dd.innerHTML = `<div class="tb-switch-empty">불러오는 중...</div>`;
  dd.classList.add('open');

  const res = await gasQuery('getOpenBatches', {});
  if(!res.ok){ dd.innerHTML = `<div class="tb-switch-empty" style="color:#FF4D6D">불러오기 실패</div>`; return; }
  const list = res.batches || [];
  if(!list.length){
    dd.innerHTML = `<div class="tb-switch-empty">조회 가능한 미완료 배치가 없습니다</div>`;
    return;
  }
  const today = new Date().toISOString().slice(0,10);
  dd.innerHTML = list.map(b => {
    const isCurrent = manualBatchOverride ? b.batchId === manualBatchOverride.batchId : (!manualBatchOverride && b.batchId === currentBatchId);
    const tag = isCurrent
      ? `<span class="tb-sw-tag" style="background:var(--green-bg); color:var(--green)">지금 보는 중</span>`
      : (b.date === today ? `<span class="tb-sw-tag" style="background:var(--green-bg); color:var(--green)">오늘</span>` : `<span class="tb-sw-tag" style="background:var(--amber-bg); color:var(--amber)">이전 날짜</span>`);
    return `<div class="tb-switch-row" data-batch="${b.batchId}" data-date="${b.date}">
      <div>
        <div class="tb-sw-id">${b.batchId}</div>
        <div class="tb-sw-meta">${b.date} · ${Number(b.totalSku).toLocaleString()} SKU · 스캔 통과 ${Number(b.scannedPass||0).toLocaleString()}건</div>
      </div>
      ${tag}
    </div>`;
  }).join('');
  dd.querySelectorAll('[data-batch]').forEach(row => {
    row.onclick = () => {
      manualBatchOverride = { batchId: row.dataset.batch, date: row.dataset.date };
      document.getElementById('manualBanner').classList.add('show');
      dd.classList.remove('open');
      pollOnce(); // 고른 배치로 즉시 갱신
    };
  });
};
document.addEventListener('click', (e) => {
  const dd = document.getElementById('switchBatchDropdownTV');
  if(dd && dd.classList.contains('open') && !e.target.closest('#btnSwitchBatchTV') && !e.target.closest('#switchBatchDropdownTV')){
    dd.classList.remove('open');
  }
});

// "실시간으로 돌아가기" — 조회 모드를 끄고 다시 활성 배치 자동 추적으로 복귀
document.getElementById('btnBackToLive').onclick = () => {
  manualBatchOverride = null;
  currentBatchId = null; // ★ 강제로 초기화해야 다음 폴링이 배치가 바뀐 걸로 인식해서 라벨을 다시 그림
  document.getElementById('manualBanner').classList.remove('show');
  pollOnce();
};

</script>
</body>
</html>
